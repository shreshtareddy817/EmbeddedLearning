<!DOCTYPE html>
<html>
<head>
  <title>FastAPI Frontend Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f5f5f5;
    }

    .container {
      width: 400px;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      cursor: pointer;
      background-color: #222;
      color: white;
      border: none;
    }

    pre {
      background: #eee;
      padding: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>FastAPI Feedback Form</h2>

    <input id="studentName" placeholder="Student Name">
    <input id="topic" placeholder="Topic">
    <input id="rating" type="number" placeholder="Rating 1 to 5">
    <textarea id="comment" placeholder="Comment"></textarea>

    <button onclick="submitFeedback()">Submit Feedback</button>

    <h3>Response</h3>
    <pre id="output"></pre>
  </div>

  <script>
    async function submitFeedback() {
      const feedbackData = {
        student_name: document.getElementById("studentName").value,
        topic: document.getElementById("topic").value,
        rating: Number(document.getElementById("rating").value),
        comment: document.getElementById("comment").value
      };

      try {
        //await fetch(): The await keyword pauses the function until the fetch() request is complete, 
        //so the data can be used right after it’s retrieved.
        const response = await fetch("http://127.0.0.1:8000/feedback", {          
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(feedbackData)
        });
        //If the response is successful, it converts the data from the server 
        //(usually in JSON format) into a JavaScript object.
        //If not successful, the control goes to catch block.
        const result = await response.json();

        document.getElementById("output").textContent =
          "Status Code: " + response.status + "\n\n" +
          JSON.stringify(result, null, 2);//the 2 adds 2-space indentation for readability

      } catch (error) {
        document.getElementById("output").textContent =
          "Error: " + error.message;
      }
    }
  </script>

</body>
</html>
