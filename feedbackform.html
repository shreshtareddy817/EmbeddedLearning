<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Feedback Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background-color:#ffffff;
        }

        .container{
            width:550px;
            margin:120px auto;
        }

        h1{
            font-size:24px;
            margin-bottom:30px;
            font-weight:600;
        }

        input,
        textarea{
            width:100%;
            padding:15px;
            margin-bottom:15px;
            border:1px solid #d3d3d3;
            font-size:16px;
            outline:none;
        }

        textarea{
            height:80px;
            resize:vertical;
        }

        button{
            width:100%;
            padding:14px;
            background-color:#3a2b2b;
            color:white;
            border:none;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            margin-bottom:25px;
        }

        button:hover{
            opacity:0.9;
        }

        h2{
            font-size:20px;
            margin-bottom:15px;
        }

        #response{
            background:#f5f5f5;
            min-height:40px;
            padding:10px;
            border-radius:3px;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>FastAPI Feedback Form</h1>

        
            <input type="text" id="studentName" placeholder="Student Name">

            <input type="text" id="topic" placeholder="Topic">

            <input type="number" id="rating" placeholder="Rating 1 to 5">

            <textarea id="comment" placeholder="Comment"></textarea>

            <button onclick="submitFeedback" type="submit">Submit Feedback </button>

        <h2>Response</h2>

        <div id="response"></div>

    </div>

</body>
</html>
