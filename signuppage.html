<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
</head>

<body bgcolor="#f2f2f2">

    <center>

        <br><br><br>

        <h1>Sign Up</h1>

        <form>

            <input type="text" placeholder="Full Name" size="40">
            <br><br>

            <input type="email" placeholder="Email Address" size="40">
            <br><br>

            <input type="password" placeholder="Password" size="40">
            <br><br>

            <input type="password" placeholder="Confirm Password" size="40">
            <br><br>

            <button
                type="submit"
                style="background-color:#1877F2;
                       color:white;
                       width:270px;
                       height:40px;
                       font-size:18px;
                       border:none;
                       border-radius:5px;
                       cursor:pointer;">
                Sign Up
            </button>

        </form>

    </center>

</body>
</html>
